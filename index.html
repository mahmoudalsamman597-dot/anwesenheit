<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AXXIN CLAN ANWESENHEIT</title>

<style>
body { background:#f5f5f5; font-family:Arial; text-align:center; }
#app { display:none; }
h1 { color:#d4af37; }

button {
    background:red;
    color:#d4af37;
    border:none;
    margin:4px;
    padding:6px 12px;
    cursor:pointer;
}

.top-buttons button { padding:8px 16px; }

#users-container {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:20px;
}

/* 📦 Standard Box */
.name-section {
    background:white;
    border:2px solid #d4af37;
    border-radius:10px;
    padding:15px;
    position:relative;
}

/* ⚠️ Warn (2/3) */
.warn {
    border:2px solid orange !important;
}

/* 🚫 Danger (3/3) */
.danger {
    border:2px solid red !important;
    background:#ffe5e5;
}

.name-section h2 { color:red; cursor:pointer; }

.delete-btn {
    position:absolute;
    top:5px; right:5px;
    background:red; color:white;
    display:none;
}

.edit-mode .delete-btn { display:block; }

.absent-btn {
    display:block;
    width:80%;
    margin:4px auto;
    padding:5px 10px;
}

.present-btn,
.excuse-btn {
    background:transparent;
    color:black;
    border:1px solid black;
    padding:6px 12px;
}

.present-btn.active,
.excuse-btn.active {
    background:green;
    color:white;
}

/* 📄 Pagination */
.pagination {
    position:fixed;
    bottom:15px;
    right:15px;
}

#addBtn { display:none; }
</style>
</head>

<body>

<div id="app">

<h1>AXXIN CLAN ANWESENHEIT</h1>

<div class="top-buttons">
<button onclick="resetAll()">Reset</button>
<button onclick="resetPresent()">Reset Anwesend</button>
</div>

<div id="users-container"></div>

<div class="pagination">
<button onclick="prevPage()">⬅</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">➡</button>
</div>

<div>
<button onclick="toggleEdit()">Bearbeiten</button>
<button id="addBtn" onclick="addUser()">➕</button>
</div>

</div>

<script>
let pw = prompt("Passwort eingeben:");
if(pw !== "AXXIN123"){
    document.body.innerHTML = "<h1>Zugriff verweigert</h1>";
} else {
    document.getElementById("app").style.display = "block";
}

let editMode = false;
let currentPage = 1;
const perPage = 20;

let users = JSON.parse(localStorage.getItem("users")) || [
"xXLouisXx","Tim_Tornado","Lehatriox","Tobel_on_Drip","CptBarkot",
"10Monk3y","jarandos991","BobblyGHG","Risikloser","Mahmoud1259",
"Zr_Loxy","saerfinley","menzer","Chrixsz2016","0TyroTV","beckermann",
"eyuporo","davidimglas","SPEEDYHG","nafsplayer","Schnitzel341",
"Lord_Emea","ALMN","Ibrahimovic_Goat","Onkel_Vali","AlphaLuxa",
"KollegeRaktus","sxite","Sapierre","Leonfxlx","VortexSlay",
"Boguisb","MattisKing","Thorgend7","IrOnAndy"
].map(n => ({name:n,absent:0,present:false,excuse:false}));

const container = document.getElementById("users-container");

function save(){ localStorage.setItem("users", JSON.stringify(users)); }

function render(){
    container.innerHTML="";

    let start = (currentPage-1)*perPage;
    let end = start + perPage;
    let pageUsers = users.slice(start,end);

    pageUsers.forEach((u,i)=>{
        let realIndex = start + i;

        let statusClass = "";
        if(u.absent == 2) statusClass = "warn";
        if(u.absent == 3) statusClass = "danger";

        let symbol = "";
        if(u.absent == 2) symbol = "⚠️";
        if(u.absent == 3) symbol = "🚫";

        container.innerHTML += `
        <div class="name-section ${statusClass}">
            <button class="delete-btn" onclick="deleteUser(${realIndex})">❌</button>

            <h2 onclick="editName(${realIndex})">${u.name}</h2>

            <div>Abwesend: ${u.absent} / 3 ${symbol}</div>

            <button class="absent-btn" onclick="inc(${realIndex})">Abwesend +</button>
            <button class="absent-btn" onclick="dec(${realIndex})">Abwesend -</button>

            <div>
                <div>Anwesend</div>
                <button class="present-btn ${u.present?"active":""}" onclick="togglePresent(${realIndex})">✔</button>
            </div>

            <div>
                <div>Entschuldigt</div>
                <button class="excuse-btn ${u.excuse?"active":""}" onclick="toggleExcuse(${realIndex})">✔</button>
            </div>
        </div>`;
    });

    document.getElementById("pageInfo").innerText =
        `Seite ${currentPage} von ${Math.ceil(users.length/perPage)}`;
}

function nextPage(){
    if(currentPage < Math.ceil(users.length/perPage)){
        currentPage++;
        render();
    }
}

function prevPage(){
    if(currentPage > 1){
        currentPage--;
        render();
    }
}

function toggleEdit(){
    editMode=!editMode;
    document.body.classList.toggle("edit-mode");
    addBtn.style.display=editMode?"inline":"none";
}

function addUser(){
    let n=prompt("Name:");
    if(!n) return;
    users.push({name:n,absent:0,present:false,excuse:false});
    save(); render();
}

function deleteUser(i){
    if(confirm("Wirklich löschen?")){
        users.splice(i,1);
        save(); render();
    }
}

function editName(i){
    if(!editMode) return;
    let n=prompt("Neuer Name:", users[i].name);
    if(n){ users[i].name=n; save(); render(); }
}

function inc(i){ if(users[i].absent<3) users[i].absent++; save(); render(); }
function dec(i){ if(users[i].absent>0) users[i].absent--; save(); render(); }

function togglePresent(i){
    users[i].present=!users[i].present;
    if(users[i].present) users[i].absent=0;
    save(); render();
}

function toggleExcuse(i){
    users[i].excuse=!users[i].excuse;
    save(); render();
}

function resetAll(){
    if(confirm("Alles zurücksetzen?")){
        users.forEach(u=>{
            u.absent=0; u.present=false; u.excuse=false;
        });
        save(); render();
    }
}

function resetPresent(){
    users.forEach(u=>u.present=false);
    save(); render();
}

render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>AXXIN CLAN ANWESENHEIT</title>
    <style>
        body {
            background: linear-gradient(135deg, #ffffff, #f2f2f2);
            font-family: Arial, sans-serif;
            text-align: center;
            color: red;
        }

        h1 {
            margin-top: 20px;
            color: #d4af37;
        }

        .top-buttons {
            margin: 10px 0 20px 0;
        }

        .top-buttons button {
            margin: 5px;
            padding: 10px 20px;
            background-color: red;
            color: #d4af37;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        #users-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        button {
            margin: 5px;
            padding: 8px 15px;
            border: none;
            background-color: red;
            color: #d4af37;
            cursor: pointer;
            font-weight: bold;
        }

        .name-section {
            padding: 15px;
            border: 2px solid #d4af37;
            border-radius: 10px;
            background-color: white;
        }

        .counter {
            margin: 5px;
            color: black;
            font-weight: bold;
        }

        .toggle-btn {
            padding: 8px 15px;
            background-color: white;
            color: black;
            border: 2px solid #ccc;
        }

        .toggle-btn.active {
            background-color: green;
            color: white;
            border: 2px solid green;
        }

        .small-text {
            font-size: 12px;
            color: black;
        }
    </style>
</head>
<body>

    <h1>AXXIN CLAN ANWESENHEIT</h1>

    <div class="top-buttons">
        <button onclick="resetCounters()">Reset</button>
        <button onclick="resetPresent()">Reset Anwesend</button>
    </div>

    <div id="users-container"></div>

    <script>
        function createUser(name, id) {
            return `
            <div class="name-section">
                <h2>${name}</h2>

                <div class="counter">Abwesend: <span id="${id}-absent">0</span> / 3</div>
                <button onclick="increment('${id}-absent')">Abwesend +</button>
                <button onclick="decrement('${id}-absent')">Abwesend -</button>

                <div style="margin-top:10px;">
                    <button class="toggle-btn present-btn" onclick="togglePresent(this, '${id}-absent')">✔</button>
                    <div class="small-text">anwesend</div>
                </div>

                <div style="margin-top:10px;">
                    <button class="toggle-btn" onclick="toggleActive(this)">✔</button>
                    <div class="small-text">entschuldigt</div>
                </div>

            </div>
            `;
        }

        const users = [
            "Bobby","Risikoloser","Mahmoud","loxy","sgfinley","memzter","chxrs",
            "TyroTV","Bekkermann","Eyupopro","davidimglas","SpeedyHg","I0Monkey",
            "Schnitzel","lordemea","Dupz","Ayman","Ibrahimovic","Tobi_on_drip",
            "Onke_vali","alphaluca","Nvklas","Kaktus","Louis","Tim Tornado",
            "Matrixx","NafSlayer","Ayman","ALPHALUCA","CptKinkot"
        ];

        const container = document.getElementById("users-container");

        users.forEach((name, index) => {
            const id = "user" + index;
            container.innerHTML += createUser(name, id);
        });

        function increment(counterId) {
            const counter = document.getElementById(counterId);
            let value = parseInt(counter.innerText);

            if (value < 3) {
                counter.innerText = value + 1;
            }
        }

        function decrement(counterId) {
            const counter = document.getElementById(counterId);
            let value = parseInt(counter.innerText);

            if (value > 0) {
                counter.innerText = value - 1;
            }
        }

        function togglePresent(button, counterId) {
            button.classList.toggle("active");

            // 🔥 WICHTIG: wenn anwesend gedrückt → reset Abwesend
            if (button.classList.contains("active")) {
                document.getElementById(counterId).innerText = "0";
            }
        }

        function toggleActive(button) {
            button.classList.toggle("active");
        }

        function resetCounters() {
            if (confirm("Alles wirklich zurücksetzen?")) {
                document.querySelectorAll(".counter span").forEach(c => c.innerText = "0");
                document.querySelectorAll(".toggle-btn").forEach(btn => btn.classList.remove("active"));
            }
        }

        function resetPresent() {
            document.querySelectorAll(".present-btn").forEach(btn => {
                btn.classList.remove("active");
            });
        }
    </script>

</body>
</html>

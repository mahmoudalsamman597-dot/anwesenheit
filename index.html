<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axien Clan Anwesenheitsliste</title>
    <style>
        body {
            background-color: black;
            color: gold;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: red;
            margin-bottom: 50px;
        }
        .person {
            margin: 20px 0;
        }
        .buttons button {
            margin: 5px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .buttons button:hover {
            opacity: 0.8;
        }
        .present {
            color: green;
        }
        .absent {
            color: red;
        }
        .reset {
            background-color: red;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Axien Clan Anwesenheitsliste</h1>

    <div class="person" id="person1">
        <p>Name: Max Mustermann</p>
        <p>Anwesenheit: <span class="counter present">0</span></p>
        <div class="buttons">
            <button onclick="increment('person1')">Anwesend +</button>
            <button onclick="decrement('person1')">Anwesend -</button>
            <button onclick="absentMinus('person1')">Abwesend -</button>
            <button onclick="absentPlus('person1')">Abwesend +</button>
        </div>
    </div>

    <!-- Weitere Personen können hier nach demselben Muster hinzugefügt werden -->
    
    <button class="reset" onclick="reset()">Reset</button>

    <script>
        function increment(personId) {
            let counter = document.getElementById(personId).querySelector('.counter');
            counter.textContent = parseInt(counter.textContent) + 1;
        }

        function decrement(personId) {
            let counter = document.getElementById(personId).querySelector('.counter');
            counter.textContent = Math.max(0, parseInt(counter.textContent) - 1);
        }

        function absentMinus(personId) {
            let counter = document.getElementById(personId).querySelector('.counter');
            counter.textContent = Math.max(0, parseInt(counter.textContent) - 1);
        }

        function absentPlus(personId) {
            let counter = document.getElementById(personId).querySelector('.counter');
            counter.textContent = parseInt(counter.textContent) + 1;
        }

        function reset() {
            if (confirm('Bist du sicher, dass du alles zurücksetzen willst?')) {
                let counters = document.querySelectorAll('.counter');
                counters.forEach(counter => counter.textContent = 0);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Anwesenheits-Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h1 { text-align: center; }
        .person { margin: 10px 0; }
        button { margin-left: 10px; }
    </style>
</head>
<body>
    <h1>Anwesenheits-Tracker</h1>
    <div id="list"></div>

    <script>
        const names = ["Ali", "Mohammed", "Ahmed", "Omar"]; // Hier die Namen definieren

        let data = JSON.parse(localStorage.getItem("attendance")) || {};

        function save() {
            localStorage.setItem("attendance", JSON.stringify(data));
        }

        function render() {
            const list = document.getElementById("list");
            list.innerHTML = "";
            names.forEach(name => {
                if (!data[name]) {
                    data[name] = { present: 0, missed: 0 };
                }
                const div = document.createElement("div");
                div.className = "person";
                div.innerHTML = `
                    <b>${name}</b>
                    | Anwesend: ${data[name].present}
                    | Gefehlt: ${data[name].missed}
                    <button onclick="markPresent('${name}')">✔️</button>
                    <button onclick="markMissed('${name}')">❌</button>
                `;
                list.appendChild(div);
            });
            save();
        }

        function markPresent(name) {
            data[name].present++;
            data[name].missed = 0;
            render();
        }

        function markMissed(name) {
            data[name].missed++;
            render();
        }

        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AXXIN CLAN ANWESENHEIT</title>

<style>
body {
    background: #dcdcdc;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #d4af37;
}

.top-buttons button {
    background: red;
    color: gold;
    padding: 10px;
    margin: 5px;
    border: none;
    cursor: pointer;
}

#users-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.name-section {
    background: #f2f2f2;
    border: 2px solid #d4af37;
    border-radius: 10px;
    padding: 15px;
}

.name-section h2 {
    color: red;
}

button {
    background: red;
    color: gold;
    border: none;
    padding: 6px 10px;
    margin: 3px;
    cursor: pointer;
}

.counter {
    font-weight: bold;
}

.toggle-btn {
    background: white;
    color: black;
    border: 2px solid #ccc;
}

.toggle-btn.active {
    background: green;
    color: white;
}

.small-text {
    font-size: 12px;
}
</style>
</head>

<body>

<h1>AXXIN CLAN ANWESENHEIT</h1>

<div class="top-buttons">
    <button onclick="resetCounters()">Reset</button>
    <button onclick="resetPresent()">Reset Anwesend</button>
</div>

<div id="users-container"></div>

<script>
function createUser(name, id) {
    return `
    <div class="name-section">
        <h2>${name}</h2>

        <div class="counter">Abwesend: <span id="${id}-absent">0</span> / 3</div>

        <button onclick="increment('${id}-absent')">Abwesend +</button><br>
        <button onclick="decrement('${id}-absent')">Abwesend -</button>

        <div style="margin-top:10px;">
            <button class="toggle-btn present-btn" onclick="togglePresent(this,'${id}-absent')">✔</button>
            <div class="small-text">anwesend</div>
        </div>

        <div style="margin-top:10px;">
            <button class="toggle-btn" onclick="toggle(this)">✔</button>
            <div class="small-text">entschuldigt</div>
        </div>
    </div>
    `;
}

const users = [
"Bobby","Risikoloser","Mahmoud","loxy","sgfinley","memzter","chxrs",
"TyroTV","Bekkermann","Eyupopro","davidimglas","SpeedyHg","I0Monkey",
"Schnitzel","lordemea","Dupz","Ayman","Ibrahimovic","Tobi_on_drip",
"Onke_vali","alphaluca","Nvklas","Kaktus","Louis","Tim Tornado",
"Matrixx","NafSlayer","Ayman","ALPHALUCA","CptKinkot"
];

const container = document.getElementById("users-container");

users.forEach((name, index) => {
    const id = "user" + index;
    container.innerHTML += createUser(name, id);
});

function increment(id) {
    let el = document.getElementById(id);
    let v = parseInt(el.innerText);
    if (v < 3) el.innerText = v + 1;
}

function decrement(id) {
    let el = document.getElementById(id);
    let v = parseInt(el.innerText);
    if (v > 0) el.innerText = v - 1;
}

function toggle(btn) {
    btn.classList.toggle("active");
}

function togglePresent(btn, id) {
    btn.classList.toggle("active");

    if (btn.classList.contains("active")) {
        document.getElementById(id).innerText = "0";
    }
}

function resetCounters() {
    if (confirm("Alles zurücksetzen?")) {
        document.querySelectorAll(".counter span").forEach(c => c.innerText = "0");
        document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
    }
}

function resetPresent() {
    document.querySelectorAll(".present-btn").forEach(b => b.classList.remove("active"));
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AXXIN CLAN ANWESENHEIT</title>

<style>
body {
    background: linear-gradient(135deg, #ffffff, #f2f2f2);
    font-family: Arial;
    text-align: center;
    color: red;
}

h1 { color: #d4af37; }

#users-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

.name-section {
    position: relative;
    padding: 15px;
    border: 2px solid #d4af37;
    border-radius: 10px;
    background: white;
}

.delete-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: red;
    color: white;
    border: none;
    display: none;
    cursor: pointer;
}

.edit-mode .delete-btn {
    display: block;
}

.toggle-btn.active {
    background: green;
    color: white;
}

button {
    margin: 5px;
    padding: 8px;
    background: red;
    color: gold;
    border: none;
    cursor: pointer;
}

.top-buttons { margin: 15px; }
.bottom-buttons { margin: 20px; }

.hidden { display: none; }
</style>
</head>

<body>

<h1>AXXIN CLAN ANWESENHEIT</h1>

<div class="top-buttons">
    <button onclick="resetCounters()">Reset</button>
    <button onclick="resetPresent()">Reset Anwesend</button>
</div>

<div id="users-container"></div>

<div class="bottom-buttons">
    <button onclick="toggleEditMode()">Bearbeiten</button>
    <button id="addBtn" class="hidden" onclick="addUser()">➕</button>
</div>

<script>
let editMode = false;

function createUser(name, id) {
    return `
    <div class="name-section" id="${id}">
        <button class="delete-btn" onclick="deleteUser('${id}')">❌</button>

        <h2 onclick="editName(this)">${name}</h2>

        <div>Abwesend: <span id="${id}-absent">0</span> / 3</div>
        <button onclick="inc('${id}-absent')">+</button>
        <button onclick="dec('${id}-absent')">-</button>

        <div>
            <button class="toggle-btn present-btn" onclick="togglePresent(this,'${id}-absent')">✔</button>
            <div>anwesend</div>
        </div>

        <div>
            <button class="toggle-btn" onclick="toggle(this)">✔</button>
            <div>entschuldigt</div>
        </div>
    </div>`;
}

function toggleEditMode() {
    editMode = !editMode;
    document.body.classList.toggle("edit-mode");
    document.getElementById("addBtn").classList.toggle("hidden");
}

function addUser() {
    const name = prompt("Name eingeben:");
    if (!name) return;

    const id = "user" + Date.now();
    container.innerHTML += createUser(name, id);
}

function deleteUser(id) {
    if (confirm("Wirklich löschen?")) {
        document.getElementById(id).remove();
    }
}

function editName(el) {
    if (!editMode) return;
    const newName = prompt("Neuer Name:", el.innerText);
    if (newName) el.innerText = newName;
}

function inc(id) {
    let el = document.getElementById(id);
    let v = parseInt(el.innerText);
    if (v < 3) el.innerText = v + 1;
}

function dec(id) {
    let el = document.getElementById(id);
    let v = parseInt(el.innerText);
    if (v > 0) el.innerText = v - 1;
}

function toggle(btn) {
    btn.classList.toggle("active");
}

function togglePresent(btn, id) {
    btn.classList.toggle("active");
    if (btn.classList.contains("active")) {
        document.getElementById(id).innerText = "0";
    }
}

function resetCounters() {
    if (confirm("Alles zurücksetzen?")) {
        document.querySelectorAll("span").forEach(s => s.innerText = "0");
        document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
    }
}

function resetPresent() {
    document.querySelectorAll(".present-btn").forEach(b => b.classList.remove("active"));
}

const users = ["Bobby","Risikoloser","Mahmoud"];
const container = document.getElementById("users-container");

users.forEach((name,i)=>{
    container.innerHTML += createUser(name,"user"+i);
});
</script>

</body>
</html>

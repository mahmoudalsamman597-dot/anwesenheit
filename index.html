<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Axxin Clan Anwesenheit</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #fffaf0; }
        h1 { text-align: center; color: #b30000; }
        .person { margin: 10px 0; padding: 10px; background-color: #ffebcd; border: 1px solid #b30000; border-radius: 5px; }
        button { margin-left: 10px; }
        #control { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Axxin Clan Anwesenheit</h1>
    <div id="control">
        <button onclick="resetIndividual('present')">Reset Anwesenheit pro Person</button>
        <button onclick="resetIndividual('missed')">Reset Fehlzeiten pro Person</button>
    </div>

    <div id="list"></div>

    <script>
        const names = ["Ali", "Mohammed", "Ahmed", "Omar"];

        let data = JSON.parse(localStorage.getItem("attendance")) || {};

        function save() {
            localStorage.setItem("attendance", JSON.stringify(data));
        }

        function render() {
            const list = document.getElementById("list");
            list.innerHTML = "";
            names.forEach(name => {
                if (!data[name]) {
                    data[name] = { present: 0, missed: 0 };
                }
                const div = document.createElement("div");
                div.className = "person";
                div.innerHTML = `
                    <b>${name}</b>
                    | Anwesend: ${data[name].present}
                    | Gefehlt: ${data[name].missed}
                    <button onclick="markPresent('${name}')">✔️</button>
                    <button onclick="markMissed('${name}')">❌</button>
                `;
                list.appendChild(div);
            });
            save();
        }

        function markPresent(name) {
            data[name].present++;
            data[name].missed = 0; // optional: Fehlzeiten zurücksetzen
            render();
        }

        function markMissed(name) {
            data[name].missed++;
            render();
        }

        function resetIndividual(type) {
            const name = prompt("Für welche Person willst du zurücksetzen? (Ali, Mohammed, Ahmed, Omar)").trim();
            if (name && data[name]) {
                if (type === 'present') {
                    data[name].present = 0;
                } else if (type === 'missed') {
                    data[name].missed = 0;
                }
                save();
                render();
            } else {
                alert("Ungültiger Name. Bitte Ali, Mohammed, Ahmed oder Omar eingeben.");
            }
        }

        render();
    </script>

</body>
</html>

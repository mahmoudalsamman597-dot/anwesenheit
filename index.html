<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AXXIN CLAN ANWESENHEIT</title>

<style>
body {
    background: #f5f5f5;
    font-family: Arial;
    text-align: center;
}

#app { display: none; }

h1 { color: #d4af37; }

/* 🔴 Standard Buttons */
button {
    background: red;
    color: gold;
    border: none;
    margin: 4px;
    padding: 8px 16px;
    cursor: pointer;
}

/* 🔴 Top Buttons */
.top-buttons button {
    padding: 10px 20px;
}

/* 📦 Grid */
#users-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* 📦 Box */
.name-section {
    background: white;
    border: 2px solid #d4af37;
    border-radius: 10px;
    padding: 15px;
    position: relative;
}

.name-section h2 {
    color: red;
    cursor: pointer;
}

/* ❌ Delete */
.delete-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: red;
    color: white;
    border: none;
    display: none;
}

.edit-mode .delete-btn {
    display: block;
}

/* 🔴 Abwesend Buttons (NEU) */
.absent-btn {
    display: block;
    width: 100%;
    margin: 5px 0;
}

/* 🟢 Toggle größer */
.present-btn,
.excuse-btn {
    background: transparent;
    color: #d4af37;
    border: 1px solid #d4af37;
    padding: 8px 14px;
    font-size: 14px;
    margin-top: 5px;
}

.present-btn.active,
.excuse-btn.active {
    background: green;
    color: white;
    border: 1px solid green;
}

/* 🔽 Bottom */
.bottom-buttons { margin: 20px; }
#addBtn { display: none; }
</style>
</head>

<body>

<div id="app">

<h1>AXXIN CLAN ANWESENHEIT</h1>

<div class="top-buttons">
    <button onclick="resetAll()">Reset</button>
    <button onclick="resetPresent()">Reset Anwesend</button>
</div>

<div id="users-container"></div>

<div class="bottom-buttons">
    <button onclick="toggleEdit()">Bearbeiten</button>
    <button id="addBtn" onclick="addUser()">➕</button>
</div>

</div>

<script>
/* 🔐 Passwort */
let pw = prompt("Passwort eingeben:");
if(pw !== "AXXIN123"){
    document.body.innerHTML = "<h1>Zugriff verweigert</h1>";
} else {
    document.getElementById("app").style.display = "block";
}

/* 💾 Daten */
let editMode = false;

let users = JSON.parse(localStorage.getItem("users")) || [
"Bobby","Risikoloser","Mahmoud","loxy","sgfinley","memzter","chxrs",
"TyroTV","Bekkermann","Eyupopro","davidimglas","SpeedyHg","I0Monkey",
"Schnitzel","lordemea","Dupz","Ayman","Ibrahimovic","Tobi_on_drip",
"Onke_vali","alphaluca","Nvklas","Kaktus","Louis","Tim Tornado",
"Matrixx","NafSlayer","Ayman","ALPHALUCA","CptKinkot"
].map(n => ({name:n,absent:0,present:false,excuse:false}));

const container = document.getElementById("users-container");

function save(){ localStorage.setItem("users", JSON.stringify(users)); }

function render(){
    container.innerHTML="";
    users.forEach((u,i)=>{
        container.innerHTML += `
        <div class="name-section">
            <button class="delete-btn" onclick="deleteUser(${i})">❌</button>

            <h2 onclick="editName(${i})">${u.name}</h2>

            <div>Abwesend: ${u.absent} / 3</div>

            <!-- 🔴 UNTEREINANDER -->
            <button class="absent-btn" onclick="inc(${i})">Abwesend +</button>
            <button class="absent-btn" onclick="dec(${i})">Abwesend -</button>

            <!-- 🟢 ANWESEND -->
            <div style="margin-top:10px;">
                <div style="font-size:13px;">Anwesend</div>
                <button class="present-btn ${u.present?"active":""}" onclick="togglePresent(${i})">✔</button>
            </div>

            <!-- 🟢 ENTSCHULDIGT -->
            <div style="margin-top:10px;">
                <div style="font-size:13px;">Entschuldigt</div>
                <button class="excuse-btn ${u.excuse?"active":""}" onclick="toggleExcuse(${i})">✔</button>
            </div>

        </div>`;
    });
}

function toggleEdit(){
    editMode=!editMode;
    document.body.classList.toggle("edit-mode");
    addBtn.style.display=editMode?"inline":"none";
}

function addUser(){
    let n=prompt("Name:");
    if(!n) return;
    users.push({name:n,absent:0,present:false,excuse:false});
    save(); render();
}

function deleteUser(i){
    if(confirm("Wirklich löschen?")){
        users.splice(i,1);
        save(); render();
    }
}

function editName(i){
    if(!editMode) return;
    let n=prompt("Neuer Name:", users[i].name);
    if(n){ users[i].name=n; save(); render(); }
}

function inc(i){ if(users[i].absent<3) users[i].absent++; save(); render(); }
function dec(i){ if(users[i].absent>0) users[i].absent--; save(); render(); }

function togglePresent(i){
    users[i].present=!users[i].present;
    if(users[i].present) users[i].absent=0;
    save(); render();
}

function toggleExcuse(i){
    users[i].excuse=!users[i].excuse;
    save(); render();
}

function resetAll(){
    if(confirm("Alles zurücksetzen?")){
        users.forEach(u=>{
            u.absent=0;
            u.present=false;
            u.excuse=false;
        });
        save(); render();
    }
}

function resetPresent(){
    users.forEach(u=>u.present=false);
    save(); render();
}

render();
</script>

</body>
</html>

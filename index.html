<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AXXIN CLAN ANWESENHEIT</title>

<style>
body { background:#f5f5f5; font-family:Arial; text-align:center; }
#app { display:none; }
h1 { color:#d4af37; }

button {
    background:red;
    color:#d4af37;
    border:none;
    margin:4px;
    padding:6px 12px;
    cursor:pointer;
}

#users-container {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.name-section {
background:white;
border:2px solid #d4af37;
border-radius:10px;
padding:15px;
position:relative;
}

.warn { border:2px solid orange !important; }
.danger { border:2px solid red !important; background:#ffe5e5; }

.absent-btn { display:block; width:80%; margin:4px auto; }

.present-btn,.excuse-btn {
background:transparent;
color:black;
border:1px solid black;
padding:6px 12px;
}

.present-btn.active,.excuse-btn.active {
background:green;
color:white;
}

.delete-btn {
position:absolute;
top:5px; right:5px;
background:red; color:white;
display:none;
}
.edit-mode .delete-btn { display:block; }

.bottom-bar {
position:fixed;
bottom:10px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:10px;
}

.pagination {
position:fixed;
bottom:10px;
right:10px;
}

.filter-menu {
display:none;
position:absolute;
bottom:40px;
background:white;
border:1px solid #ccc;
padding:5px;
}
</style>
</head>

<body>

<div id="app">

<h1>AXXIN CLAN ANWESENHEIT</h1>

<div>
<button onclick="resetAll()">Reset</button>
<button onclick="resetPresent()">Reset Anwesend</button>
</div>

<div id="users-container"></div>

<div class="pagination">
<button onclick="prevPage()">⬅</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">➡</button>
</div>

<div class="bottom-bar">
<button onclick="toggleEdit()">Bearbeiten</button>

<div style="position:relative;">
<button onclick="toggleFilter()">⋮ Filter</button>
<div id="filterMenu" class="filter-menu">
<button onclick="setFilter('all')">Alle</button>
<button onclick="setFilter('warn')">2/3 ⚠️</button>
<button onclick="setFilter('danger')">3/3 🚫</button>
</div>
</div>

<button id="addBtn" onclick="addUser()">➕</button>
</div>

</div>

<script>
let pw = prompt("Passwort eingeben:");
if(pw !== "AXXIN123"){
document.body.innerHTML = "<h1>Zugriff verweigert</h1>";
} else {
document.getElementById("app").style.display = "block";
}

let editMode = false;
let currentPage = 1;
let filter = "all";
const perPage = 30;

/* Namen */
let baseNames = [
"xXLouisXx","Tim_Tornado","Lehatriox","Tobel_on_Drip","CptBarkot",
"10Monk3y","jarandos991","BobblyGHG","Risikloser","Mahmoud1259",
"Zr_Loxy","saerfinley","menzer","Chrixsz2016","0TyroTV",
"beckermann","eyuporo","davidimglas","SPEEDYHG","nafsplayer",
"Schnitzel341","Lord_Emea","ALMN","Ibrahimovic_Goat","Onkel_Vali",
"AlphaLuxa","KollegeRaktus","sxite","Sapierre","Leonfxlx",
"VortexSlay","Boguisb","MattisKing","Thorgend7","IrOnAndy"
];

let stored = JSON.parse(localStorage.getItem("users"));
let users = stored || baseNames.map(n => ({name:n,absent:0,present:false,excuse:false}));

const container = document.getElementById("users-container");

function save(){ localStorage.setItem("users", JSON.stringify(users)); }

function toggleFilter(){
let m=document.getElementById("filterMenu");
m.style.display=m.style.display==="block"?"none":"block";
}

function setFilter(f){
filter=f;
currentPage=1;
render();
}

function render(){
container.innerHTML="";

let filtered=users;
if(filter==="warn") filtered=users.filter(u=>u.absent==2);
if(filter==="danger") filtered=users.filter(u=>u.absent==3);

let start=(currentPage-1)*perPage;
let pageUsers=filtered.slice(start,start+perPage);

pageUsers.forEach((u)=>{
let index=users.indexOf(u);

let cls=u.absent==2?"warn":u.absent==3?"danger":"";
let sym=u.absent==2?"⚠️":u.absent==3?"🚫":"";

container.innerHTML+=`
<div class="name-section ${cls}">
<button class="delete-btn" onclick="deleteUser(${index})">❌</button>

<h2 onclick="editName(${index})">${u.name}</h2>

<div>Abwesend: ${u.absent} / 3 ${sym}</div>

<button class="absent-btn" onclick="inc(${index})">Abwesend +</button>
<button class="absent-btn" onclick="dec(${index})">Abwesend -</button>

<div>Anwesend</div>
<button class="present-btn ${u.present?"active":""}" onclick="togglePresent(${index})">✔</button>

<div>Entschuldigt</div>
<button class="excuse-btn ${u.excuse?"active":""}" onclick="toggleExcuse(${index})">✔</button>

</div>`;
});

document.getElementById("pageInfo").innerText =
`Seite ${currentPage} von ${Math.max(1,Math.ceil(filtered.length/perPage))}`;
}

/* FIXED Pagination */
function nextPage(){
let filtered=users;
if(filter==="warn") filtered=users.filter(u=>u.absent==2);
if(filter==="danger") filtered=users.filter(u=>u.absent==3);

if(currentPage < Math.ceil(filtered.length/perPage)){
currentPage++;
render();
}
}

function prevPage(){
if(currentPage>1){
currentPage--;
render();
}
}

/* Edit */
function toggleEdit(){
editMode=!editMode;
document.body.classList.toggle("edit-mode");
addBtn.style.display=editMode?"inline":"none";
}

function addUser(){
let n=prompt("Name:");
if(!n) return;
users.push({name:n,absent:0,present:false,excuse:false});
save(); render();
}

function deleteUser(i){
if(confirm("Löschen?")){
users.splice(i,1);
save(); render();
}
}

function editName(i){
if(!editMode) return;
let n=prompt("Neuer Name:", users[i].name);
if(n){ users[i].name=n; save(); render(); }
}

/* Actions */
function inc(i){ if(users[i].absent<3) users[i].absent++; save(); render(); }
function dec(i){ if(users[i].absent>0) users[i].absent--; save(); render(); }

function togglePresent(i){
users[i].present=!users[i].present;
if(users[i].present) users[i].absent=0;
save(); render();
}

function toggleExcuse(i){
users[i].excuse=!users[i].excuse;
save(); render();
}

function resetAll(){
if(confirm("Alles zurücksetzen?")){
users.forEach(u=>{
u.absent=0; u.present=false; u.excuse=false;
});
save(); render();
}
}

function resetPresent(){
users.forEach(u=>u.present=false);
save(); render();
}

render();
</script>

</body>
</html>

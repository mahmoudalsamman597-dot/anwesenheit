<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>AXXEN-CLAN ANWESENHEIT</title>
    <style>
        body {
            background-color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            color: red;
        }

        h1 {
            margin-top: 20px;
            color: goldenrod;
        }

        .reset-btn {
            margin: 10px 0 20px 0;
            padding: 10px 25px;
            background-color: red;
            color: gold;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        button {
            margin: 5px;
            padding: 8px 15px;
            border: none;
            background-color: red;
            color: gold;
            cursor: pointer;
            font-weight: bold;
        }

        .name-section {
            margin: 15px;
            padding: 15px;
            border: 2px solid goldenrod;
            display: inline-block;
            width: 250px;
            border-radius: 10px;
        }

        .counter {
            margin: 5px;
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>AXXEN-CLAN ANWESENHEIT</h1>

    <button class="reset-btn" onclick="resetCounters()">Reset</button>

    <div id="users-container"></div>

    <script>
        function createUser(name, id) {
            return `
            <div class="name-section">
                <h2>${name}</h2>
                <div class="counter">Anwesend: <span id="${id}-present">0</span></div>
                <div class="counter">Abwesend: <span id="${id}-absent">0</span></div>

                <button onclick="increment('${id}-present')">Anwesend +</button>
                <button onclick="decrement('${id}-present')">Anwesend -</button>
                <button onclick="increment('${id}-absent')">Abwesend +</button>
                <button onclick="decrement('${id}-absent')">Abwesend -</button>
            </div>
            `;
        }

        const users = [
            "Bobby","Risikoloser","Mahmoud","loxy","sgfinley","memzter","chxrs",
            "TyroTV","Bekkermann","Eyupopro","davidimglas","SpeedyHg","I0Monkey",
            "Schnitzel","lordemea","Dupz","Ayman","Ibrahimovic","Tobi_on_drip",
            "Onke_vali","alphaluca","Nvklas","Kaktus","Louis","Tim Tornado",
            "Matrixx","NafSlayer","Ayman","ALPHALUCA","CptKinkot"
        ];

        const container = document.getElementById("users-container");

        users.forEach((name, index) => {
            const id = "user" + index;
            container.innerHTML += createUser(name, id);
        });

        function increment(counterId) {
            const counter = document.getElementById(counterId);
            counter.innerText = parseInt(counter.innerText) + 1;
        }

        function decrement(counterId) {
            const counter = document.getElementById(counterId);
            if (parseInt(counter.innerText) > 0) {
                counter.innerText = parseInt(counter.innerText) - 1;
            }
        }

        function resetCounters() {
            if (confirm("Bist du sicher, dass du alles zurücksetzen möchtest?")) {
                const counters = document.querySelectorAll(".counter span");
                counters.forEach(counter => {
                    counter.innerText = '0';
                });
            }
        }
    </script>

</body>
</html>

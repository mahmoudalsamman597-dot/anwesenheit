<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AXXIN CLAN ANWESENHEIT</title>

<style>
body {
    background: #f5f5f5;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #d4af37;
}

.top-buttons button {
    background: red;
    color: gold;
    border: none;
    padding: 10px 20px;
    margin: 5px;
    cursor: pointer;
}

#users-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 20px;
}

.name-section {
    background: white;
    border: 2px solid #d4af37;
    border-radius: 10px;
    padding: 15px;
    position: relative;
}

.name-section h2 {
    color: red;
    cursor: pointer;
}

.delete-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: red;
    color: white;
    border: none;
    display: none;
    cursor: pointer;
}

.edit-mode .delete-btn {
    display: block;
}

button {
    background: red;
    color: gold;
    border: none;
    margin: 3px;
    padding: 6px 10px;
    cursor: pointer;
}

.present-btn.active {
    background: green;
    color: white;
}

.excuse-btn.active {
    background: green;
    color: white;
}

.bottom-buttons {
    margin: 20px;
}

#addBtn {
    display: none;
}
</style>
</head>

<body>

<h1>AXXIN CLAN ANWESENHEIT</h1>

<div class="top-buttons">
    <button onclick="resetAll()">Reset</button>
    <button onclick="resetPresent()">Reset Anwesend</button>
</div>

<div id="users-container"></div>

<div class="bottom-buttons">
    <button onclick="toggleEdit()">Bearbeiten</button>
    <button id="addBtn" onclick="addUser()">➕</button>
</div>

<script>
let editMode = false;

function createUser(name, id) {
    return `
    <div class="name-section" id="${id}">
        <button class="delete-btn" onclick="deleteUser('${id}')">❌</button>

        <h2 onclick="editName(this)">${name}</h2>

        <div>Abwesend: <span id="${id}-absent">0</span> / 3</div>

        <button onclick="inc('${id}-absent')">Abwesend +</button>
        <button onclick="dec('${id}-absent')">Abwesend -</button>

        <br>

        <button class="present-btn" onclick="togglePresent(this,'${id}-absent')">✔ anwesend</button>

        <br>

        <button class="excuse-btn" onclick="toggle(this)">✔ entschuldigt</button>
    </div>
    `;
}

function toggleEdit() {
    editMode = !editMode;
    document.body.classList.toggle("edit-mode");
    document.getElementById("addBtn").style.display = editMode ? "inline-block" : "none";
}

function addUser() {
    let name = prompt("Name:");
    if (!name) return;
    let id = "user" + Date.now();
    container.innerHTML += createUser(name, id);
}

function deleteUser(id) {
    if (confirm("Wirklich löschen?")) {
        document.getElementById(id).remove();
    }
}

function editName(el) {
    if (!editMode) return;
    let name = prompt("Neuer Name:", el.innerText);
    if (name) el.innerText = name;
}

function inc(id) {
    let el = document.getElementById(id);
    let v = parseInt(el.innerText);
    if (v < 3) el.innerText = v + 1;
}

function dec(id) {
    let el = document.getElementById(id);
    let v = parseInt(el.innerText);
    if (v > 0) el.innerText = v - 1;
}

function toggle(btn) {
    btn.classList.toggle("active");
}

function togglePresent(btn, id) {
    btn.classList.toggle("active");
    if (btn.classList.contains("active")) {
        document.getElementById(id).innerText = "0";
    }
}

function resetAll() {
    if (confirm("Alles zurücksetzen?")) {
        document.querySelectorAll("span").forEach(s => s.innerText = "0");
        document.querySelectorAll(".present-btn, .excuse-btn").forEach(b => b.classList.remove("active"));
    }
}

function resetPresent() {
    document.querySelectorAll(".present-btn").forEach(b => b.classList.remove("active"));
}

const users = [
"Bobby","Risikoloser","Mahmoud","loxy","sgfinley","memzter","chxrs",
"TyroTV","Bekkermann","Eyupopro","davidimglas","SpeedyHg","I0Monkey",
"Schnitzel","lordemea","Dupz","Ayman","Ibrahimovic","Tobi_on_drip",
"Onke_vali","alphaluca","Nvklas","Kaktus","Louis","Tim Tornado",
"Matrixx","NafSlayer","Ayman","ALPHALUCA","CptKinkot"
];

const container = document.getElementById("users-container");

users.forEach((name,i)=>{
    container.innerHTML += createUser(name,"user"+i);
});
</script>

</body>
</html>
